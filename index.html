<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog API - Test UI</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111827;
      --panel-2: #0f172a;
      --border: #1f2937;
      --text: #e6edf3;
      --muted: #9ca3af;
      --accent: #2563eb;
      --danger: #ef4444;
      --ok: #10b981;
    }
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .wrap { max-width: 1100px; margin: 32px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    h2 { margin: 0 0 8px; font-size: 18px; }
    h3 { margin: 8px 0; font-size: 14px; color: var(--muted); }
    label { display: block; font-size: 12px; color: var(--muted); margin-top: 12px; }
    input, textarea { width: 100%; margin-top: 6px; padding: 10px; border-radius: 8px; border: 1px solid #374151; background: var(--panel-2); color: var(--text); }
    button { margin-top: 12px; padding: 10px 14px; background: var(--accent); border: 0; color: white; border-radius: 8px; cursor: pointer; }
    button.secondary { background: #334155; }
    button.danger { background: var(--danger); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .muted { color: var(--muted); }
    .meta { font-size: 11px; color: #94a3b8; }
    .pill { font-size: 10px; text-transform: uppercase; color: #60a5fa; }
    .card-head { display: flex; justify-content: space-between; align-items: center; }
    .error { color: #f87171; }
    pre { background: #0b1220; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: #e2e8f0; overflow: auto; }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>POST /api/articles</h2>
      <h3>Creer un article</h3>

      <label for="create-titre">Titre</label>
      <input id="create-titre" type="text" />

      <label for="create-auteur">Auteur</label>
      <input id="create-auteur" type="text" />

      <label for="create-categorie">Categorie</label>
      <input id="create-categorie" type="text" />

      <label for="create-date">Date</label>
      <input id="create-date" type="date" />

      <label for="create-tags">Tags (separes par virgule)</label>
      <input id="create-tags" type="text" placeholder="python, fastapi" />

      <label for="create-contenu">Contenu</label>
      <textarea id="create-contenu" rows="5"></textarea>

      <button onclick="createArticle()">Creer</button>
    </div>

    <div class="card">
      <h2>GET /api/articles</h2>
      <h3>Liste et filtres</h3>
      <div class="row">
        <div>
          <label for="filter-categorie">Categorie</label>
          <input id="filter-categorie" type="text" />
        </div>
        <div>
          <label for="filter-auteur">Auteur</label>
          <input id="filter-auteur" type="text" />
        </div>
      </div>
      <label for="filter-date">Date</label>
      <input id="filter-date" type="date" />
      <div class="row">
        <button onclick="loadArticles()">Charger</button>
        <button class="secondary" onclick="clearFilters()">Reinitialiser</button>
      </div>

      <h3>Articles</h3>
      <div id="display-area"></div>
    </div>

    <div class="card">
      <h2>GET /api/articles/{id}</h2>
      <h3>Lire un article</h3>
      <label for="get-id">ID</label>
      <input id="get-id" type="number" min="1" />
      <button onclick="getArticleById()">Afficher</button>

      <h2 style="margin-top:20px">DELETE /api/articles/{id}</h2>
      <h3>Supprimer un article</h3>
      <label for="delete-id">ID</label>
      <input id="delete-id" type="number" min="1" />
      <button class="danger" onclick="deleteByIdInput()">Supprimer</button>
    </div>

    <div class="card">
      <h2>PUT /api/articles/{id}</h2>
      <h3>Modifier un article</h3>
      <label for="update-id">ID</label>
      <input id="update-id" type="number" min="1" />

      <label for="update-titre">Titre (optionnel)</label>
      <input id="update-titre" type="text" />

      <label for="update-contenu">Contenu (optionnel)</label>
      <textarea id="update-contenu" rows="4"></textarea>

      <label for="update-categorie">Categorie (optionnel)</label>
      <input id="update-categorie" type="text" />

      <label for="update-tags">Tags (optionnel)</label>
      <input id="update-tags" type="text" placeholder="python, fastapi" />

      <button onclick="updateArticle()">Mettre a jour</button>

      <h2 style="margin-top:20px">GET /api/articles/search</h2>
      <h3>Recherche</h3>
      <label for="search-query">Query</label>
      <input id="search-query" type="text" placeholder="mot cle" />
      <button onclick="searchArticles()">Rechercher</button>
    </div>

    <div class="card">
      <h2>Reponse API</h2>
      <pre id="response-box">En attente...</pre>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
